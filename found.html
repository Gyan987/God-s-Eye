<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Report Found Item — God's Eye</title>
    <meta name="description" content="Report found items to God's Eye (simple page).">
    <meta name="author" content="Human contributors">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
          <h1 class="big-title">GOD'S EYE</h1>
          <span class="human-made" title="Crafted by people">Human-made</span>
        </div>
        <nav>
          <a href="index.html">Home</a>
          <a href="lost.html">Report Lost</a>
        </nav>
      </div>
    </header>

    <main class="container" role="main">
      <h2>Report Found Item</h2>
      <form id="foundForm">
        <label for="foundImage" class="sr-only">Upload photo</label>
        <input type="file" id="foundImage" accept="image/*">

        <label for="foundPlace" class="sr-only">Found location</label>
        <input type="text" id="foundPlace" placeholder="Found location">

        <label for="foundDate" class="sr-only">Found date</label>
        <input type="date" id="foundDate">

        <label for="foundDesc" class="sr-only">Description</label>
        <textarea id="foundDesc" rows="3" placeholder="Description (optional)"></textarea>

        <button id="saveFound" type="button">Save Found Item</button>
      </form>

      <div id="foundPreview" style="margin-top:12px" class="helper-text"></div>
    </main>
  </body>
</html>
