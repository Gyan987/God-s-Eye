<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Report Lost Item — God's Eye</title>
    <meta name="description" content="Report lost items to God's Eye (top-level static page).">
    <meta name="author" content="Human contributors">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
          <h1 class="big-title">GOD'S EYE</h1>
          <span class="human-made" title="Crafted by people">Human-made</span>
        </div>
        <nav>
          <a href="index.html">Home</a>
          <a href="found.html">Report Found</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container" role="main">
      <div id="formStatus" role="status" aria-live="polite" class="sr-only"></div>
      <form id="lostForm" aria-label="Report lost item">
        <label for="itemName" class="sr-only">Item Name</label>
        <input name="itemName" type="text" id="itemName" placeholder="Item Name" aria-required="true" required minlength="2" autofocus>

        <label for="category" class="sr-only">Category</label>
        <select name="category" id="category">
          <option value="">Category (optional)</option>
          <option>Wallet</option>
          <option>Phone</option>
          <option>Keys</option>
          <option>Bag</option>
          <option>Other</option>
        </select>

        <label for="color" class="sr-only">Color</label>
        <input name="color" type="text" id="color" placeholder="Color (e.g. black)">

        <label for="brand" class="sr-only">Brand</label>
        <input name="brand" type="text" id="brand" placeholder="Brand (optional)">

        <label for="serial" class="sr-only">Serial</label>
        <input name="serial" type="text" id="serial" placeholder="Serial / ID (optional)">

        <label for="description" class="sr-only">Description</label>
        <textarea name="description" id="description" placeholder="Description (optional)" rows="3"></textarea>

        <label for="lostPlace" class="sr-only">Location Lost</label>
        <input name="lostPlace" type="text" id="lostPlace" placeholder="Location lost" required>

        <label for="lostDate" class="sr-only">Date</label>
        <input name="lostDate" type="date" id="lostDate" required>

        <label for="contact" class="sr-only">Contact</label>
        <input name="contact" type="text" id="contact" placeholder="Contact (optional)">

        <button type="submit">Submit Lost Item</button>
      </form>

      <section aria-label="Reported lost items">
        <h3 class="sr-only">Reported lost items</h3>
        <div class="card">
          <table id="lostTable">
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Color</th>
                <th>Brand</th>
                <th>Place</th>
                <th>Date</th>
                <th>Contact</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="lostTbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
