<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>God's Eye</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container">
      <h1>God's Eye</h1>
    </div>
  </header>

  <main id="main" class="container" role="main">

    <h2>Report Lost Item</h2>

    <form id="lostForm" aria-label="Report lost item">
      <label for="itemName" class="sr-only">Item Name</label>
      <input type="text" id="itemName" placeholder="Item Name" aria-describedby="itemNameHelp" aria-required="true" required minlength="2" autofocus>
      <div id="itemNameHelp" class="helper-text">Example: "Black leather wallet" — be specific.</div>

      <label for="lostPlace" class="sr-only">Lost Place</label>
      <input type="text" id="lostPlace" placeholder="Lost Place" aria-describedby="lostPlaceHelp" aria-required="true" required>
      <div id="lostPlaceHelp" class="helper-text">Where you last remember seeing it (campus, cafe, bus stop).</div>

      <label for="lostDate" class="sr-only">Date lost</label>
      <input type="date" id="lostDate" aria-describedby="lostDateHelp" aria-required="true" required>
      <div id="lostDateHelp" class="helper-text">If unknown, pick an approximate date.</div>

      <button type="submit">Submit Lost Item</button>
    </form>

  </main>

  <script src="app.js"></script>
</body>
</html>
